spring.application.name=shopnow

#database configuration
spring.datasource.url=${DB_URL}?prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# debug sql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace

# debug rollback
logging.level.org.springframework.orm.jpa.JpaTransactionManager=DEBUG
logging.level.org.springframework.transaction=DEBUG
# jwt
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# a day
application.security.jwt.expiration=86400000
# 7 days
application.security.jwt.refresh-token.expiration=604800000

# OAuth2 Client Registration
spring.security.oauth2.client.registration.google.client-id=${GG_OAUTH2ID_CLIENT}
spring.security.oauth2.client.registration.google.client-secret=${GG_OAUTH2ID_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.github.client-id=${GIT_OAUTH2ID_CLIENT}
spring.security.oauth2.client.registration.github.client-secret=${GIT_OAUTH2ID_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user

# Redirect URI to frontend on success (custom property)
application.security.oauth2.redirect-uri=http://localhost:3000/oauth2/redirect