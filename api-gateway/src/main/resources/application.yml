server:
  port: 8080

spring:
  application:
    name: shopnow-api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: root-swagger
              uri: lb://shopnow-user-service
              predicates:
                - Path=/swagger-ui.html,/v3/api-docs
              filters:
                - RewritePath=/(?<segment>.*), /api/users/$\{segment}
            - id: user-service
              uri: lb://shopnow-user-service
              predicates:
                - Path=/api/users/**
            - id: product-service
              uri: lb://shopnow-product
              predicates:
                - Path=/api/products/**,/api/categories/**
            - id: order-service
              uri: lb://shopnow-order
              predicates:
                - Path=/api/orders/**,/api/internal/orders/**
            - id: cart-service
              uri: lb://shopnow-cart
              predicates:
                - Path=/api/carts/**
            - id: payment-service
              uri: lb://shopnow-payment
              predicates:
                - Path=/api/payments/**
            - id: auth-service
              uri: lb://shopnow-auth-service
              predicates:
                - Path=/api/auth/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
